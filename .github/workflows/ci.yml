name: ci

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  release-macos-arm64:
    name: macOS arm64 build, test, and package
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up OCaml
        uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: "5.4"
          dune-cache: true

      - name: Install dependencies
        run: opam install . --deps-only --with-test

      - name: Build and test
        run: opam exec -- dune build @runtest

      - name: Package macOS archive
        run: opam exec -- ./scripts/package-macos.sh

      - name: Upload macOS archive
        uses: actions/upload-artifact@v4
        with:
          name: sessy-darwin-arm64
          path: dist/sessy-*-darwin-arm64.tar.gz
          if-no-files-found: error

  release-linux-musl:
    name: Linux x86_64 musl build, test, and package
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Linux archive in Docker
        run: ./scripts/package-linux-musl-docker.sh

      - name: Upload Linux archive
        uses: actions/upload-artifact@v4
        with:
          name: sessy-linux-x86_64-musl
          path: dist/sessy-*-linux-x86_64-musl.tar.gz
          if-no-files-found: error
